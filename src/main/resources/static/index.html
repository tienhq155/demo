<!DOCTYPE html>
<html>

<head>
    <title>Landing Page Test</title>
    <meta charset="UTF-8">
</head>

<body>
    <h2>Đăng ký nhận tư vấn</h2>
    <input type="text" id="name" placeholder="Tên của bạn"><br><br>
    <input type="text" id="phone" placeholder="Số điện thoại"><br><br>
    <button onclick="sendData()">Gửi thông tin</button>

    <h2>Tìm khách hàng</h2>
    <input type="text" id="searchName" placeholder=""><br><br>
    <button onclick="showdata()">Tìm Theo khách hàng</button>
    <div id="resultArea" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;"></div>

    <script>
        async function sendData() {
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value
            };

            try {
                const response = await fetch('/api/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    alert('Đã lưu khách hàng: ' + result.name);

                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                } else {
                    const errorMsg = await response.text();
                    alert('Lỗi: ' + errorMsg);
                }

            } catch (error) {
                console.error('Lỗi:', error);
                alert('Không kết nối được server');
            }
        }

        async function showdata() {
            const keyword = document.getElementById('searchName').value;
            const resultArea = document.getElementById('resultArea');

            resultArea.innerHTML = "Đang tìm...";

            try {
                const response = await fetch(`/api/customers/search?q=${keyword}`);

                if (!response.ok) {
                    const err = await response.text();
                    resultArea.innerHTML = `<p style="color:red;">Lỗi: ${err}</p>`;
                    return;
                }

                const data = await response.json();

                if (data.length === 0) {
                    resultArea.innerHTML = "<p style='color:red;'>Không tìm thấy ai!</p>";
                    return;
                }

                let html = "<h3>Kết quả:</h3>";

                data.forEach(customer => {
                    html += `
            <div>
                ID: ${customer.id}<br>
                Tên: <input id="name-${customer.id}" value="${customer.name}">
                SĐT: <input id="phone-${customer.id}" value="${customer.phone}">
                <button onclick="updateData(${customer.id})">Lưu</button>
                <button onclick="deleteCustomer(${customer.id})">Xóa</button>
            </div><hr>`;
                });

                resultArea.innerHTML = html;

            } catch (error) {
                console.error(error);
                resultArea.innerHTML = "Lỗi kết nối server";
            }
        }


        function deleteCustomer(id) {
            if (confirm("Bạn có chắc chắn muốn xóa khách hàng này không?")) {
                fetch(`/api/customers/${id}`, {
                    method: 'DELETE'
                })
                    .then(response => {
                        if (response.ok) {
                            alert("Đã xóa thành công!");
                            showdata();
                        } else {
                            alert("Xóa thất bại!");
                        }
                    })
                    .catch(error => console.error('Lỗi:', error));
            }
        }
        function updateData(id) {
            // Lấy giá trị từ đúng ô input của ID đó
            const updatedName = document.getElementById(`name-${id}`).value;
            const updatedPhone = document.getElementById(`phone-${id}`).value;

            const data = {
                name: updatedName,
                phone: updatedPhone
            };

            fetch(`/api/customers/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(response => {
                    if (response.ok) {
                        alert("Đã cập nhật ID " + id + " thành công!");
                        showdata(); // Tải lại để đảm bảo dữ liệu đã khớp với DB
                    } else {
                        alert("Lỗi khi cập nhật!");
                    }
                })
                .catch(error => console.error('Lỗi:', error));
        }
    </script>
</body>

</html>
